# =============================================================================
# linkyee — BoBee 有拜有保庇 Configuration
# =============================================================================

# Theme — directory under ./themes/.
theme: paper-card

# HTML <html lang> attribute
lang: "zh-TW"

# Force a color scheme: auto | light | dark
color_scheme: auto

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
plugins:
  - LunarCountdownPlugin: []

# -----------------------------------------------------------------------------
# Tracking
# -----------------------------------------------------------------------------
google_analytics_id:

# -----------------------------------------------------------------------------
# Profile header
# -----------------------------------------------------------------------------
title: "BoBee 有拜有保庇"
avatar: "./images/profile.jpg"
name: "BoBee 有拜有保庇"
tagline: "跟著保庇小蜂，天天領福氣、保平安。🐝"

# -----------------------------------------------------------------------------
# Links
#   icon  — Font Awesome class (https://fontawesome.com/search?o=r&m=free)
#   text  — displayed text (Liquid + HTML allowed)
#   title — link title attribute
#   url   — destination
#   alt   — accessibility text
#   target — `_blank` (new tab) or `_self`
#   is_header — true to render as a section label instead of a link
#   style_type — custom style class suffix (e.g. "red")
# -----------------------------------------------------------------------------
links:
  - link:
      is_header: true
      icon: "fa-brands fa-facebook"
      text: "BoBee 粉絲團"

  - link:
      icon: "fa-brands fa-facebook"
      text: "點我進入：BoBee 粉絲團 <span class='link-button-text'>(按讚關注保庇小蜂，天天領福氣)</span>"
      url: "https://www.facebook.com/profile.php?id=61590633894057"
      alt: "點我進入：BoBee 粉絲團"
      title: "BoBee 粉絲團"
      target: "_blank"

  - link:
      is_header: true
      icon: "fa-solid fa-hands-praying"
      text: "誠心敬意"

  - link:
      id: "pray-countdown"
      icon: "fa-solid fa-bell"
      text: "<span id='pray-title-span'>{{ vars.LunarCountdownPlugin.closer_15.title }}</span><span class='link-button-text' id='pray-subtitle-span'>{{ vars.LunarCountdownPlugin.closer_15.subtitle }}</span>"
      url: "https://goodaytw.com/"
      alt: "下一個拜拜日提醒"
      title: "下一個拜拜日提醒"
      target: "_blank"
      style_type: "latest"

  - link:
      icon: "fa-solid fa-calendar-days"
      text: "BoBee 嚴選：線上農民曆 <span class='link-button-text'>(看每日吉凶宜忌、節氣沖煞，好日子輕鬆查)</span>"
      url: "https://goodaytw.com/"
      alt: "BoBee 嚴選：線上農民曆"
      title: "線上農民曆"
      target: "_blank"

  - link:
      icon: "fa-solid fa-calendar-check"
      text: "BoBee 嚴選：神明誕辰行事曆 <span class='link-button-text'>(神明誕辰拜拜求平安，福氣好運天天來)</span>"
      url: "https://www.fude.studio/calendar/app"
      alt: "BoBee 嚴選：神明誕辰行事曆"
      title: "神明誕辰行事曆"
      target: "_blank"

  - link:
      is_header: true
      icon: "fa-solid fa-heart-pulse"
      text: "守護健康"

  - link:
      icon: "fa-solid fa-clipboard-check"
      text: "BoBee 嚴選：日常健康簡單測 <span class='link-button-text'>(動動手指，關心自己吃得好不好、日常活動好輕鬆)</span>"
      url: "https://tjcare1.lovable.app/"
      alt: "BoBee 嚴選：日常健康簡單測"
      title: "日常健康簡單測"
      target: "_blank"

  - link:
      is_header: true
      icon: "fa-solid fa-shield-halved"
      text: "安心防騙"

  - link:
      icon: "fa-solid fa-magnifying-glass"
      text: "BoBee 嚴選：網路傳言看真假 <span class='link-button-text'>(先查證再轉傳，真心分享不漏氣)</span>"
      url: "https://www.mygopen.com/"
      alt: "BoBee 嚴選：網路傳言看真假"
      title: "網路傳言看真假"
      target: "_blank"

  - link:
      icon: "fa-solid fa-phone-volume"
      text: "BoBee 嚴選：165 全民防騙網 <span class='link-button-text'>(守護辛苦錢與養老金，小心詐騙不上當！)</span>"
      url: "https://165.npa.gov.tw/"
      alt: "BoBee 嚴選：165 全民防騙網"
      title: "165 全民防騙網"
      target: "_blank"
      style_type: "red"

# -----------------------------------------------------------------------------
# Social media buttons (optional, can be empty)
# -----------------------------------------------------------------------------
socials:
  - social:
      icon: "fa-brands fa-facebook"
      url: "https://www.facebook.com/profile.php?id=61590633894057"
      title: "BoBee Facebook"
      alt: "BoBee Facebook Page"
      target: "_blank"

# -----------------------------------------------------------------------------
# Footer
# -----------------------------------------------------------------------------
footer: >
  保庇小蜂關心您！與您一同守護幸福平安，天天福氣滿滿。 🍯
  <br>
  如有任何防詐騙或假消息的疑慮，歡迎免費撥打 165 專線，或用 MyGoPen 來查證，讓您安心又放心。

# Footer copyright message
copyright: >
  © {{ year }} <a href="https://gasolin.idv.tw/" target="_blank">BoBee 有拜有保庇</a>. Powered by <a href="https://github.com/ZhgChgLi/linkyee" target="_blank">linkyee</a>
