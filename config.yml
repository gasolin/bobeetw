# =============================================================================
# linkyee — BoBee 有拜有保庇 Configuration
# =============================================================================

# Theme — directory under ./themes/.
theme: paper-card

# HTML <html lang> attribute
lang: "zh-TW"

# Force a color scheme: auto | light | dark
color_scheme: auto

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
plugins: []

# -----------------------------------------------------------------------------
# Tracking
# -----------------------------------------------------------------------------
google_analytics_id:

# -----------------------------------------------------------------------------
# Profile header
# -----------------------------------------------------------------------------
title: "BoBee 有拜有保庇"
avatar: "./images/profile.png"
name: "BoBee 有拜有保庇"
tagline: "跟著保庇小蜂，天天領福氣。🐝"

# -----------------------------------------------------------------------------
# Links
#   icon  — Font Awesome class (https://fontawesome.com/search?o=r&m=free)
#   text  — displayed text (Liquid + HTML allowed)
#   title — link title attribute
#   url   — destination
#   alt   — accessibility text
#   target — `_blank` (new tab) or `_self`
#   is_header — true to render as a section label instead of a link
#   style_type — custom style class suffix (e.g. "red")
# -----------------------------------------------------------------------------
links:
  - link:
      is_header: true
      icon: "fa-solid fa-hive"
      text: "核心連結與實用工具"

  - link:
      icon: "fa-brands fa-facebook"
      text: "🏆 點我進入：BoBee 粉絲團 <span class='link-button-text'>(跟著保庇小蜂，天天領福氣)</span>"
      url: "https://www.facebook.com/"
      alt: "點我進入：BoBee 粉絲團"
      title: "BoBee 粉絲團"
      target: "_blank"

  - link:
      icon: "fa-solid fa-calendar-days"
      text: "✅ BoBee 嚴選：線上農民曆 <span class='link-button-text'>(每日宜忌、節氣沖煞與吉時查詢)</span>"
      url: "https://goodaytw.com/"
      alt: "BoBee 嚴選：線上農民曆"
      title: "線上農民曆"
      target: "_blank"

  - link:
      icon: "fa-solid fa-calendar-check"
      text: "✅ BoBee 嚴選：神明誕辰行事曆 <span class='link-button-text'>(掌握神明誕辰，祈福平安不漏接)</span>"
      url: "https://zh.wikipedia.org/wiki/%E7%A5%9E%E8%AA%95"
      alt: "BoBee 嚴選：神明誕辰行事曆"
      title: "神明誕辰行事曆"
      target: "_blank"

  - link:
      is_header: true
      icon: "fa-solid fa-shield-halved"
      text: "守護長輩與安心防騙"

  - link:
      icon: "fa-solid fa-shield-heart"
      text: "🚫 BoBee 叮嚀：165 全民防騙網 <span class='link-button-text'>(守護長輩錢包，詐騙退散！)</span>"
      url: "https://165.npa.gov.tw/"
      alt: "BoBee 叮嚀：165 全民防騙網"
      title: "165 全民防騙網"
      target: "_blank"
      style_type: "red"

  - link:
      icon: "fa-solid fa-circle-check"
      text: "✅ BoBee 叮嚀：假訊息查證 <span class='link-button-text'>(查核 Line 常見的假消息、偏方與謠言)</span>"
      url: "https://www.mygopen.com/"
      alt: "BoBee 叮嚀：假訊息查證"
      title: "假訊息查證"
      target: "_blank"

# -----------------------------------------------------------------------------
# Social media buttons (optional, can be empty)
# -----------------------------------------------------------------------------
socials:
  - social:
      icon: "fa-brands fa-facebook"
      url: "https://www.facebook.com/"
      title: "BoBee Facebook"
      alt: "BoBee Facebook Page"
      target: "_blank"

# -----------------------------------------------------------------------------
# Footer
# -----------------------------------------------------------------------------
footer: >
  保庇小蜂關心您！與長輩一同守護幸福平安，天天福氣滿滿。 🍯
  <br>
  如有任何防詐騙或假訊息疑慮，請善用 165 專線與 MyGoPen 查證服務。

# Footer copyright message
copyright: >
  © {{ year }} <a href="https://github.com/gasolin/bobeetw" target="_blank">BoBee 有拜有保庇</a>. Powered by <a href="https://github.com/ZhgChgLi/linkyee" target="_blank">linkyee</a>
